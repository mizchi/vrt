<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #fff; }
  /* CHANGE: header padding 16px -> 40px (causes vertical shift of all content below) */
  header { background: #2563eb; color: white; padding: 40px 20px; }
  header h1 { font-size: 20px; }
  nav { background: #f3f4f6; padding: 10px 20px; border-bottom: 1px solid #e5e7eb; }
  nav a { margin-right: 16px; color: #374151; text-decoration: none; font-size: 14px; }
  main { padding: 20px; }
  .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; color: #111827; margin-bottom: 8px; }
  .card p { font-size: 14px; color: #6b7280; line-height: 1.5; }
  .stats { display: flex; gap: 16px; margin-bottom: 16px; }
  .stat-box { flex: 1; background: #eff6ff; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-box .number { font-size: 24px; font-weight: bold; color: #2563eb; }
  .stat-box .label { font-size: 12px; color: #6b7280; }
  footer { background: #1f2937; color: #9ca3af; padding: 16px 20px; text-align: center; font-size: 12px; }
</style>
</head>
<body>
  <header><h1>Dashboard</h1></header>
  <nav>
    <a href="#">Home</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
  </nav>
  <main>
    <div class="stats">
      <div class="stat-box"><div class="number">1,234</div><div class="label">Users</div></div>
      <div class="stat-box"><div class="number">567</div><div class="label">Orders</div></div>
      <div class="stat-box"><div class="number">89%</div><div class="label">Uptime</div></div>
    </div>
    <div class="card"><h2>Recent Activity</h2><p>User signups increased by 12% this week. Server response time improved to 120ms average.</p></div>
    <div class="card"><h2>Notifications</h2><p>3 new alerts pending review. System backup completed successfully at 03:00 UTC.</p></div>
  </main>
  <footer>&copy; 2026 Dashboard Inc.</footer>
</body>
</html>
